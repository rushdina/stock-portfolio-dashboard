name: CI/CD React Vite to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read 
  pages: write 
  id-token: write 

concurrency:
  group: "react-vite-pages" 
  cancel-in-progress: true 

jobs:
  test: 
    name: Run Lint & Unit Tests 
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint 

      - name: Run Tests 
        run: npm run test:ci # Run Vitest

  build-deploy: 
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test # Only runs if test job passes before deployment

    environment:
      name: github-pages 
      url: ${{ steps.deployment.outputs.page_url }} # GitHub Pages URL

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Get repo files in this job's VM

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" 
          cache: "npm" # speeds up builds by caching node_modules
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci 

      - name: Build project
        run: npm run build
        # Creates dist/ folder with production-ready static files

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        # Prepares GitHub Pages for artifact deployment

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment # reference to output url
        uses: actions/deploy-pages@v4
